  <body>
    <div id="root"></div>

    <!-- Accessible cookie consent (placeholder) -->
    <div id="cookie-consent" class="cookie-consent" role="dialog" aria-modal="true" aria-labelledby="cookie-title" tabindex="-1">
      <div class="cookie-inner">
        <p id="cookie-title" class="cookie-title">Nous utilisons des cookies pour améliorer l'expérience.</p>
        <div class="cookie-actions">
          <button id="accept-cookies" class="btn-cookie">Accepter</button>
          <a id="manage-cookies" href="/politique-de-confidentialite" class="cookie-manage">Gérer</a>
        </div>
        <button id="close-cookies" class="cookie-close" aria-label="Fermer">✕</button>
      </div>
    </div>

    <script>
      (function(){
        try{
          if(document.cookie.indexOf('cookie_consent=1')===-1){
            var el=document.getElementById('cookie-consent');
            var acceptBtn=document.getElementById('accept-cookies');
            var closeBtn=document.getElementById('close-cookies');
            // show the banner by toggling an open class
            el.classList.add('open');
            // Move focus to the accept button for keyboard users
            try{ acceptBtn.focus(); }catch(e){}

            acceptBtn.addEventListener('click', function(){
              document.cookie='cookie_consent=1;path=/;max-age=' + (60*60*24*365);
              el.classList.remove('open');
            });

            closeBtn.addEventListener('click', function(){ el.classList.remove('open'); });

            // Allow ESC to close the banner
            document.addEventListener('keydown', function onKey(e){ if(e.key === 'Escape'){ el.classList.remove('open'); document.removeEventListener('keydown', onKey); } });
          }
        }catch(e){/* silent */}
      })();
    </script>

  </body>
